<!doctype html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dice Roller API Test</title>
    <style>
        body { 
            font-family: sans-serif; 
            padding: 20px; 
        }
        .result { 
            margin-top: 10px; 
            padding: 10px; 
            background: #f0f0f0; 
            border: 1px solid #ccc; 
        }
    </style>
</head>
<body>
    <h1>Dice Roller API Tester</h1>
    <h5>CPSC 44000 - Software Engineering</h5>
    <p>This is a test for the RESTful APIs of the Web Dice Roller but does NOT implement the UI.</p>

    <button onclick="testWakeUp()">Test Wake Up API</button>
    <button onclick="testRoll()">Test Roll API (d20)</button>

    <div id="output" class="result"></div>

    <script>
        // 1. Calls Wake Up API
        async function testWakeUp() {
            const res = await fetch('/api/wakeup');
            const data = await res.json();
            document.getElementById('output').innerText = JSON.stringify(data, null, 2);
        }

        // 2. Calls Roll API
        async function testRoll() {
            const res = await fetch('/api/roll?sides=20');
            const data = await res.json();
            document.getElementById('output').innerText = JSON.stringify(data, null, 2);
        }
    </script>
</body>
</html>
